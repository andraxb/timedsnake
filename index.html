<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timed Tetris</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    color: #eee;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 300px;
    padding: 8px 4px;
  }

  #hud span {
    font-size: 16px;
    font-weight: 600;
  }

  #timer { color: #f55; }
  #score { color: #5f5; }
  #username-display { color: #5bf; font-size: 13px !important; }

  canvas {
    border: 2px solid #333;
    background: #1a1a1a;
    display: block;
  }

  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 5;
    background: rgba(0,0,0,0.75);
    padding: 16px 24px;
    border-radius: 10px;
  }

  #message:empty { display: none; }

  #message h2 {
    font-size: 28px;
    margin-bottom: 8px;
  }

  #message p {
    font-size: 14px;
    color: #aaa;
  }

  /* Hamburger menu */
  #menu-btn {
    position: absolute;
    top: 0;
    right: -44px;
    width: 36px;
    height: 36px;
    background: none;
    border: 1px solid #444;
    border-radius: 6px;
    color: #ccc;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
  }

  #menu-btn:hover { background: #333; }

  #menu-dropdown {
    display: none;
    position: absolute;
    top: 40px;
    right: -44px;
    background: #222;
    border: 1px solid #444;
    border-radius: 8px;
    min-width: 200px;
    z-index: 20;
    overflow: hidden;
  }

  #menu-dropdown.open { display: block; }

  #menu-dropdown button {
    display: block;
    width: 100%;
    padding: 12px 16px;
    background: none;
    border: none;
    color: #ddd;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
  }

  #menu-dropdown button:hover { background: #333; }

  /* Overlay (high scores & username input) */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 50;
    justify-content: center;
    align-items: center;
  }

  .overlay.open { display: flex; }

  .overlay-box {
    background: #222;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 24px 32px;
    min-width: 320px;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .overlay-box h3 {
    margin-bottom: 16px;
    font-size: 20px;
  }

  .overlay-box table {
    width: 100%;
    border-collapse: collapse;
  }

  .overlay-box th, .overlay-box td {
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid #333;
    font-size: 14px;
  }

  .overlay-box th { color: #aaa; }

  .overlay-box input[type="text"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #555;
    border-radius: 6px;
    background: #1a1a1a;
    color: #eee;
    font-size: 16px;
    margin-bottom: 12px;
  }

  .overlay-box .btn-row {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .overlay-box button {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }

  .btn-primary { background: #5b5; color: #111; font-weight: 600; }
  .btn-secondary { background: #444; color: #ddd; }

  #multiplier-bar {
    width: 300px;
    padding: 6px 8px;
    font-size: 14px;
    font-weight: 600;
    color: #f0c040;
    text-align: center;
    min-height: 28px;
  }

  #highscore-status {
    color: #aaa;
    font-size: 13px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <span id="username-display"></span>
    <span id="score">Score: 0</span>
    <span id="timer">1:00</span>
  </div>
  <canvas id="canvas" width="300" height="600"></canvas>
  <div id="multiplier-bar"></div>
  <div id="message"></div>

  <button id="menu-btn">&#9776;</button>
  <div id="menu-dropdown">
    <button id="menu-restart">Restart Game</button>
    <button id="menu-username">Enter Username</button>
    <button id="menu-highscore">Show High Scores</button>
  </div>
</div>

<!-- Username overlay -->
<div class="overlay" id="username-overlay">
  <div class="overlay-box">
    <h3>Enter Username</h3>
    <input type="text" id="username-input" maxlength="20" placeholder="Your name...">
    <div class="btn-row">
      <button class="btn-secondary" id="username-cancel">Cancel</button>
      <button class="btn-primary" id="username-save">Save</button>
    </div>
  </div>
</div>

<!-- High score overlay -->
<div class="overlay" id="highscore-overlay">
  <div class="overlay-box">
    <h3>High Scores</h3>
    <p id="highscore-status">Loading...</p>
    <table id="highscore-table">
      <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="highscore-body"></tbody>
    </table>
    <br>
    <div class="btn-row">
      <button class="btn-secondary" id="highscore-close">Close</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────
const API_URL = 'https://timed-snake-iz4n5.ondigitalocean.app/timedsnake2/default/highscore';
const COLS      = 10;
const ROWS      = 20;
const TILE      = 30; // canvas 300x600
const GAME_TIME = 120;
const DROP_START   = 200;  // ms per gravity step at start
const DROP_MIN     = 100;
const DROP_SPEEDUP = 20;   // ms faster per line cleared

// Line-clear base points (indexed by lines cleared)
const LINE_POINTS = [0, 1, 3, 5, 8];

// ── Silly name generator ────────────────────────────────────────────
const ADJ = ['Turbo','Sneaky','Hyper','Cosmic','Dizzy','Funky','Pixel','Wobbly','Mega','Zippy','Cranky','Crunchy','Sparkly','Grumpy','Bouncy','Salty','Fuzzy','Silly','Spicy','Gnarly'];
const NOUN = ['Penguin','Waffle','Goblin','Noodle','Potato','Pickle','Muffin','Cactus','Nugget','Toaster','Badger','Donut','Taco','Wizard','Llama','Pretzel','Turnip','Hamster','Walrus','Burrito'];

function randomName() {
  const a = ADJ[Math.floor(Math.random() * ADJ.length)];
  const n = NOUN[Math.floor(Math.random() * NOUN.length)];
  const d = Math.floor(Math.random() * 100);
  return `${a}${n}${d}`;
}

// ── Tetromino definitions ───────────────────────────────────────────
const PIECES = {
  I: { color: '#4dd0e1', shape: [[1,1,1,1]] },
  O: { color: '#ffd54f', shape: [[1,1],[1,1]] },
  T: { color: '#ba68c8', shape: [[0,1,0],[1,1,1]] },
  S: { color: '#81c784', shape: [[0,1,1],[1,1,0]] },
  Z: { color: '#e57373', shape: [[1,1,0],[0,1,1]] },
  L: { color: '#ffb74d', shape: [[0,0,1],[1,1,1]] },
  J: { color: '#64b5f6', shape: [[1,0,0],[1,1,1]] }
};
const PIECE_KEYS = Object.keys(PIECES);

function rotateCW(shape) {
  const rows = shape.length, cols = shape[0].length;
  const out = Array.from({ length: cols }, () => new Array(rows).fill(0));
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      out[c][rows - 1 - r] = shape[r][c];
    }
  }
  return out;
}

// ── State ───────────────────────────────────────────────────────────
let username = localStorage.getItem('snake_username') || randomName();
localStorage.setItem('snake_username', username);

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let board, current, score, totalScore, linesCleared, timeLeft, gameOver, started, dropTimer, countdownTimer;

function emptyBoard() {
  return Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
}

function init() {
  board = emptyBoard();
  score = 0;
  totalScore = 0;
  linesCleared = 0;
  timeLeft = GAME_TIME;
  gameOver = false;
  started = false;
  clearInterval(dropTimer);
  clearInterval(countdownTimer);
  spawnPiece();
  updateHud();
  draw();
  showMessage('Timed Tetris', 'Press any arrow / WASD key to start');
}

function spawnPiece() {
  const key = PIECE_KEYS[Math.floor(Math.random() * PIECE_KEYS.length)];
  const def = PIECES[key];
  const shape = def.shape.map(row => row.slice());
  current = {
    shape,
    color: def.color,
    x: Math.floor((COLS - shape[0].length) / 2),
    y: 0
  };
  // If it can't even spawn, that's a game-over-ish board fill
  if (!canPlace(current.shape, current.x, current.y)) {
    endRound();
  }
}

function canPlace(shape, px, py) {
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[0].length; c++) {
      if (!shape[r][c]) continue;
      const x = px + c, y = py + r;
      if (x < 0 || x >= COLS || y >= ROWS) return false;
      if (y >= 0 && board[y][x]) return false;
    }
  }
  return true;
}

function lockPiece() {
  for (let r = 0; r < current.shape.length; r++) {
    for (let c = 0; c < current.shape[0].length; c++) {
      if (current.shape[r][c]) {
        const x = current.x + c, y = current.y + r;
        if (y >= 0 && y < ROWS) board[y][x] = current.color;
      }
    }
  }
  const cleared = clearLines();
  if (cleared > 0) {
    linesCleared += cleared;
    const points = LINE_POINTS[cleared] * getMultiplier();
    score = Math.round((score + points) * 100) / 100;
    totalScore = Math.round((totalScore + points) * 100) / 100;
    restartDropInterval();
  }
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(cell => cell !== null)) {
      board.splice(r, 1);
      board.unshift(new Array(COLS).fill(null));
      cleared++;
      r++; // recheck same row
    }
  }
  return cleared;
}

function getMultiplier() {
  const tier = Math.floor(linesCleared / 5);
  return 1 + tier * 0.25;
}

function getCurrentDropMs() {
  return Math.max(DROP_MIN, DROP_START - linesCleared * DROP_SPEEDUP);
}

function restartDropInterval() {
  clearInterval(dropTimer);
  dropTimer = setInterval(drop, getCurrentDropMs());
}

// ── Game loop ───────────────────────────────────────────────────────
function start() {
  if (started) return;
  started = true;
  hideMessage();
  dropTimer = setInterval(drop, DROP_START);
  countdownTimer = setInterval(() => {
    timeLeft--;
    updateHud();
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function drop() {
  if (gameOver) return;
  if (canPlace(current.shape, current.x, current.y + 1)) {
    current.y++;
  } else {
    lockPiece();
  }
  updateHud();
  draw();
}

function move(dx) {
  if (gameOver || !started) return;
  if (canPlace(current.shape, current.x + dx, current.y)) {
    current.x += dx;
    draw();
  }
}

function softDrop() {
  if (gameOver || !started) return;
  if (canPlace(current.shape, current.x, current.y + 1)) {
    current.y++;
    draw();
  } else {
    lockPiece();
    draw();
  }
}

function rotate() {
  if (gameOver || !started) return;
  const rotated = rotateCW(current.shape);
  // Try basic wall kicks
  const kicks = [0, -1, 1, -2, 2];
  for (const k of kicks) {
    if (canPlace(rotated, current.x + k, current.y)) {
      current.shape = rotated;
      current.x += k;
      draw();
      return;
    }
  }
}

function endRound() {
  // Board filled up — reset board, keep timer/total, reset multiplier+speed
  board = emptyBoard();
  score = 0;
  linesCleared = 0;
  restartDropInterval();
  spawnPiece();
  updateHud();
  draw();
}

function endGame() {
  gameOver = true;
  clearInterval(dropTimer);
  clearInterval(countdownTimer);
  showMessage(`Time's up!  Total: ${totalScore}`, 'Press SPACE to play again');
  submitScore(totalScore);
}

function restartRound() {
  if (!gameOver) {
    // mid-game quick reset of the board (round score resets, total keeps accumulating)
    board = emptyBoard();
    score = 0;
    linesCleared = 0;
    restartDropInterval();
    spawnPiece();
    updateHud();
    draw();
  } else {
    init();
  }
}

// ── Rendering ───────────────────────────────────────────────────────
function drawCell(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
  // subtle inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, 4);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#222';
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * TILE, 0);
    ctx.lineTo(i * TILE, canvas.height);
    ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath();
    ctx.moveTo(0, i * TILE);
    ctx.lineTo(canvas.width, i * TILE);
    ctx.stroke();
  }

  // Locked board
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawCell(c, r, board[r][c]);
    }
  }

  // Current piece
  if (current) {
    for (let r = 0; r < current.shape.length; r++) {
      for (let c = 0; c < current.shape[0].length; c++) {
        if (current.shape[r][c]) {
          drawCell(current.x + c, current.y + r, current.color);
        }
      }
    }
  }
}

function updateHud() {
  const m = Math.floor(timeLeft / 60);
  const s = String(timeLeft % 60).padStart(2, '0');
  document.getElementById('timer').textContent = `${m}:${s}`;
  document.getElementById('score').textContent = `Score: ${score}  |  Total: ${totalScore}`;
  document.getElementById('username-display').textContent = username;

  const mult = getMultiplier();
  const bar = document.getElementById('multiplier-bar');
  if (mult > 1) {
    const nextAt = (Math.floor(linesCleared / 5) + 1) * 5;
    bar.textContent = `${mult}x multiplier  ·  next at ${nextAt} lines`;
  } else {
    bar.textContent = linesCleared > 0 ? `1x  ·  next multiplier at 5 lines` : '';
  }
}

function showMessage(title, sub) {
  const el = document.getElementById('message');
  el.innerHTML = `<h2>${title}</h2><p>${sub}</p>`;
}

function hideMessage() {
  document.getElementById('message').innerHTML = '';
}

// ── Input ───────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.querySelector('.overlay.open')) return;

  const key = e.key;

  if (key === ' ') {
    e.preventDefault();
    restartRound();
    return;
  }

  let handled = false;

  if (key === 'ArrowLeft'  || key === 'a' || key === 'A') { move(-1); handled = true; }
  if (key === 'ArrowRight' || key === 'd' || key === 'D') { move(1);  handled = true; }
  if (key === 'ArrowDown'  || key === 's' || key === 'S') { softDrop(); handled = true; }
  if (key === 'ArrowUp'    || key === 'w' || key === 'W') { rotate();   handled = true; }

  if (handled) {
    e.preventDefault();
    if (!started && !gameOver) start();
  }
});

// ── Menu ────────────────────────────────────────────────────────────
const menuBtn = document.getElementById('menu-btn');
const menuDrop = document.getElementById('menu-dropdown');

menuBtn.addEventListener('click', () => menuDrop.classList.toggle('open'));
document.addEventListener('click', e => {
  if (!menuBtn.contains(e.target) && !menuDrop.contains(e.target)) {
    menuDrop.classList.remove('open');
  }
});

document.getElementById('menu-restart').addEventListener('click', () => {
  location.reload();
});

// Username
document.getElementById('menu-username').addEventListener('click', () => {
  menuDrop.classList.remove('open');
  document.getElementById('username-input').value = username;
  document.getElementById('username-overlay').classList.add('open');
});

document.getElementById('username-cancel').addEventListener('click', () => {
  document.getElementById('username-overlay').classList.remove('open');
});

document.getElementById('username-save').addEventListener('click', () => {
  const v = document.getElementById('username-input').value.trim();
  if (v) {
    username = v;
    localStorage.setItem('snake_username', username);
    updateHud();
  }
  document.getElementById('username-overlay').classList.remove('open');
});

// High scores
document.getElementById('menu-highscore').addEventListener('click', () => {
  menuDrop.classList.remove('open');
  document.getElementById('highscore-overlay').classList.add('open');
  loadHighScores();
});

document.getElementById('highscore-close').addEventListener('click', () => {
  document.getElementById('highscore-overlay').classList.remove('open');
});

// ── High score API ──────────────────────────────────────────────────
async function submitScore(s) {
  if (!API_URL || s <= 0) return;
  try {
    const params = new URLSearchParams({ username, score: s });
    await fetch(`${API_URL}?${params}`);
  } catch (err) {
    console.warn('Could not submit score:', err);
  }
}

async function loadHighScores() {
  const status = document.getElementById('highscore-status');
  const tbody = document.getElementById('highscore-body');
  tbody.innerHTML = '';

  if (!API_URL) {
    status.textContent = 'No API configured — set API_URL in the script.';
    return;
  }

  status.textContent = 'Loading...';
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    status.textContent = '';
    if (!data.scores || data.scores.length === 0) {
      status.textContent = 'No scores yet.';
      return;
    }
    data.scores.forEach((entry, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i + 1}</td><td>${esc(entry.username)}</td><td>${entry.score}</td>`;
      tbody.appendChild(tr);
    });
  } catch (err) {
    status.textContent = 'Failed to load scores.';
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Start ───────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
